name: Build & Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --noconfirm

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/VoxAIInput/VoxAIInput.exe")) {
            Write-Error "VoxAIInput.exe not found"
            exit 1
          }
          Write-Host "=== Build output ==="
          Get-ChildItem "dist/VoxAIInput" | ForEach-Object {
            if ($_.PSIsContainer) { Write-Host "  [DIR]  $($_.Name)" }
            else { Write-Host "  [FILE] $($_.Name)  ($([math]::Round($_.Length/1KB)) KB)" }
          }

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "dist/VoxAIInput/*" -DestinationPath "release/VoxAIInput-${{ steps.version.outputs.VERSION }}-win64.zip" -Force
          $size = [math]::Round((Get-Item "release/VoxAIInput-${{ steps.version.outputs.VERSION }}-win64.zip").Length / 1MB, 1)
          Write-Host "Created zip: $size MB"

      - name: Generate update manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zip = "release/VoxAIInput-$version-win64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $zip).Length
          $manifest = @{
            version = $version
            assets = @{
              "VoxAIInput-$version-win64.zip" = @{
                size = $size
                sha256 = $hash
              }
            }
          } | ConvertTo-Json -Depth 4
          Set-Content "release/update-manifest.json" -Value $manifest
          Write-Host $manifest

      - name: Update installer version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content installer.iss -Raw
          $content = $content -replace '#define MyAppVersion "[\d.]+"', ('#define MyAppVersion "' + $version + '"')
          Set-Content installer.iss -Value $content

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Get-ChildItem release/*.exe | ForEach-Object { Write-Host "$($_.Name)  $([math]::Round($_.Length/1MB, 1)) MB" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxAIInput-Windows
          path: |
            release/VoxAIInput-Setup-*.exe
            release/VoxAIInput-*.zip
            release/update-manifest.json
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vox AI Input v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            release/VoxAIInput-Setup-*.exe
            release/VoxAIInput-*.zip
            release/update-manifest.json
            config.example.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
