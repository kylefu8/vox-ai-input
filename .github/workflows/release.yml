name: Build & Release (Windows)

# 触发条件：推送 v* 格式的 tag（如 v0.2.0）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 允许手动触发（调试用）

permissions:
  contents: write # 允许创建 GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 3.11（兼容性好，PyInstaller 支持完善）
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安装运行依赖 + 打包工具
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      # 4. 提取版本号（从 tag）
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      # 5. 用 PyInstaller --onedir 打包
      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --noconfirm

      # 6. 验证构建产物
      - name: Verify build output
        run: |
          if (Test-Path "dist/VoxAIInput/VoxAIInput.exe") {
            $size = (Get-ChildItem "dist/VoxAIInput" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "Build successful! Total size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build failed: VoxAIInput.exe not found"
            exit 1
          }

      # 7. 生成增量更新包 + 清单
      - name: Generate app-update.zip
        run: python scripts/post_build.py

      # 8. 更新 installer.iss 中的版本号
      - name: Update installer version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" |
            Set-Content installer.iss

      # 9. 安装 Inno Setup 并构建安装包
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # 10. 验证产物
      - name: List release artifacts
        shell: pwsh
        run: |
          Write-Host "=== Release artifacts ==="
          Get-ChildItem release/ | ForEach-Object { Write-Host "  $($_.Name)  ($([math]::Round($_.Length/1KB, 1)) KB)" }

      # 11. 上传构建产物（调试用）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxAIInput-Windows
          path: |
            release/VoxAIInput-Setup-*.exe
            release/app-update.zip
            release/update-manifest.json
          retention-days: 7

      # 12. 创建 GitHub Release 并上传所有资产
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vox AI Input v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            release/VoxAIInput-Setup-*.exe
            release/app-update.zip
            release/update-manifest.json
            config.example.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
